<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Remotent — Multi-Agent Workspace</title>
    <meta
      name="description"
      content="Remotent. A cyber-minimalist control surface for orchestrating multi-agent ACP sessions."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body>
    <!-- ───────────── Application Shell ───────────── -->
    <main class="shell" role="application" aria-label="Remotent workspace" data-view="hub">
      <!-- ░░░ Column 1 — Icon Rail ░░░ -->
      <nav class="rail" aria-label="Primary">
        <a class="rail__brand" href="#" aria-label="Remotent home">
          <span class="rail__mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
              <path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 17h7" stroke="currentColor" stroke-width="1.25"/>
              <circle cx="16.5" cy="13.5" r="1.25" fill="currentColor"/>
            </svg>
          </span>
        </a>

        <ul class="rail__list" role="list">
          <li>
            <button class="rail__btn is-active" data-view-target="hub" aria-label="User Hub" data-tooltip="User Hub · 用户中枢">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.25">
                <circle cx="12" cy="8" r="3.25"/>
                <path d="M5 20c1.2-3.4 4-5 7-5s5.8 1.6 7 5"/>
              </svg>
            </button>
          </li>
          <li>
            <button class="rail__btn" data-view-target="nodes" aria-label="Node Overview" data-tooltip="Nodes · 节点总览">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.25">
                <circle cx="6" cy="6" r="2"/><circle cx="18" cy="6" r="2"/>
                <circle cx="6" cy="18" r="2"/><circle cx="18" cy="18" r="2"/>
                <path d="M8 6h8M6 8v8M18 8v8M8 18h8"/>
              </svg>
            </button>
          </li>
          <li>
            <button class="rail__btn" aria-label="Settings" data-tooltip="Settings · 设置">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.25">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1A2 2 0 1 1 4.4 17l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1A2 2 0 1 1 7 4.4l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1A2 2 0 1 1 19.6 7l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
              </svg>
            </button>
          </li>
        </ul>

        <div class="rail__foot">
          <span class="rail__pulse" aria-hidden="true"></span>
          <span class="rail__user" aria-label="Signed in as Wen">W</span>
        </div>
      </nav>

      <!-- ░░░ Column 2 — Session List ░░░ -->
      <aside class="sessions" aria-label="Sessions">
        <!-- React mount: src/react/Sessions.tsx via App.tsx portal -->
      </aside>

      <!-- ░░░ Column 3 — Canvas ░░░ -->
      <section class="canvas" aria-label="Conversation canvas">
        <!-- React mount: src/react/Canvas.tsx via App.tsx portal -->
      </section>

      <!-- ░░░ Node Overview — Column 2: Node list ░░░ -->
      <aside class="nodes-panel" aria-label="Nodes" hidden>
        <header class="sessions__head">
          <div class="sessions__title">
            <h1>
              <span class="serif">Nod</span><span class="sans">·es</span>
            </h1>
            <p class="sessions__sub" id="nodesFleetMeta">ACP fleet · 0 online / 0 total</p>
          </div>

          <button class="sessions__new" id="newNodeBtn" aria-label="New node">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            <span>New</span>
          </button>
        </header>

        <div class="sessions__search">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5"/><path d="m20 20-3.5-3.5"/>
          </svg>
          <input type="search" id="nodesSearch" placeholder="Search nodes, models, tools…" aria-label="Search nodes" />
          <kbd>⌘K</kbd>
        </div>

        <nav class="tabs" role="tablist" aria-label="Filter nodes">
          <button class="tabs__btn is-active" role="tab" aria-selected="true" data-node-filter="all">
            All <span class="tabs__count" data-count-for="all">0</span>
          </button>
          <button class="tabs__btn" role="tab" aria-selected="false" data-node-filter="live">
            Live <span class="tabs__count" data-count-for="live">0</span>
          </button>
          <button class="tabs__btn" role="tab" aria-selected="false" data-node-filter="idle">
            Idle <span class="tabs__count" data-count-for="idle">0</span>
          </button>
          <button class="tabs__btn" role="tab" aria-selected="false" data-node-filter="paused">
            Paused <span class="tabs__count" data-count-for="paused">0</span>
          </button>
          <button class="tabs__btn" role="tab" aria-selected="false" data-node-filter="error">
            Error <span class="tabs__count" data-count-for="error">0</span>
          </button>
        </nav>

        <section class="group" aria-label="Pinned">
          <h2 class="group__label"><span>Pinned</span><span class="group__rule" aria-hidden="true"></span></h2>
          <ul class="thread-list node-list" id="nodeListPinned" role="list"></ul>
        </section>

        <section class="group" aria-label="Fleet">
          <h2 class="group__label"><span>Fleet</span><span class="group__rule" aria-hidden="true"></span></h2>
          <ul class="thread-list node-list" id="nodeListAll" role="list"></ul>
        </section>
      </aside>

      <!-- ░░░ Node Overview — Column 3: Node detail canvas ░░░ -->
      <section class="canvas canvas--node" aria-label="Node detail" hidden>
        <header class="canvas__head">
          <div class="canvas__crumbs">
            <span>Fleet</span>
            <span class="canvas__sep">/</span>
            <span class="canvas__crumb-current" id="nodeCrumb">—</span>
          </div>

          <div class="canvas__nodes" id="nodeStatus" aria-label="Node status">
            <!-- populated by JS: pulse + acp endpoint + actions -->
          </div>
        </header>

        <div class="canvas__title" id="nodeTitle">
          <p class="kicker" id="nodeKicker">—</p>
          <h2 class="display">
            <span class="display__serif" id="nodeNameSerif">—</span><span class="display__sans" id="nodeNameSans"></span>
          </h2>
          <p class="lede" id="nodeLede">—</p>
          <ul class="node-meta" id="nodeMeta" aria-label="Node metadata"></ul>
        </div>

        <div class="node-detail" id="nodeDetail">
          <!-- Capabilities + Activity sections rendered by JS -->
        </div>
      </section>
      <div id="react-root" hidden></div>
    </main>

    <script src="/src/main.js" type="module"></script>
  </body>
</html>
